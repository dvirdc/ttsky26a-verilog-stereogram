# Tiny Tapeout project information
project:
  title:        "Raspberry Pi Camera VGA Stereogram Engine"
  author:       "dvirdc"
  discord:      ""
  description:  "Reads a 4-bit depth map from a Raspberry Pi camera stream and outputs a real-time SIRDS autostereogram over VGA (640x480@60Hz, TinyVGA PMOD)"
  language:     "Verilog"
  clock_hz:     50000000   # 50 MHz system clock; 25 MHz pixel clock derived on-chip

  # 2x1 tile: comfortably fits 32x6-bit shift register + VGA counters + control
  tiles: "2x1"

  top_module:  "tt_um_ttsky26a_stereogram"

  source_files:
    - "project.v"
    - "vga_sync.v"
    - "stereogram_core.v"

# Pin descriptions
pinout:
  # Inputs – depth map from Raspberry Pi (parallel, sampled at pixel clock)
  ui[0]: "depth[0] – LSB of 4-bit depth from Pi (0=far, 15=near)"
  ui[1]: "depth[1]"
  ui[2]: "depth[2]"
  ui[3]: "depth[3] – MSB of 4-bit depth from Pi"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs – TinyVGA PMOD (standard pinout)
  uo[0]: "VGA R1 (red MSB)"
  uo[1]: "VGA G1 (green MSB)"
  uo[2]: "VGA B1 (blue MSB)"
  uo[3]: "VGA VSYNC (active-low)"
  uo[4]: "VGA R0 (red LSB)"
  uo[5]: "VGA G0 (green LSB)"
  uo[6]: "VGA B0 (blue LSB)"
  uo[7]: "VGA HSYNC (active-low)"

  # Bidirectional – sync outputs to Raspberry Pi
  uio[0]: "pclk_out – 25 MHz pixel clock; Pi drives depth on each rising edge"
  uio[1]: "frame_start – 1-cycle pulse at first pixel of every frame"
  uio[2]: "line_start  – 1-cycle pulse at first pixel of each active row"
  uio[3]: "active      – high during the 640x480 visible area"
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
